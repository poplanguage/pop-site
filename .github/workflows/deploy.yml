name: Deploy Pop Book to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'public/**'
      - 'src/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Install, check, build, and upload cached site
        uses: withastro/action@v6
        with:
          node-version: 24
          package-manager: pnpm@10.33.4
          # withastro/action also caches pnpm's store through actions/setup-node.
          cache: true
          cache-dir: node_modules/.astro

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
